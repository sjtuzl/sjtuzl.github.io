---
layout: default
title: "Posts from 2010"
permalink: /2010/
---
<div class="post-header" style="max-width:var(--max-wide)">
  <h1 class="post-title">Posts from 2010</h1>
  <p class="post-meta"><a href="/archive.html">← Archive</a></p>
</div>
<section class="archive-year">
  <ul class="archive-list">
  {% for post in site.posts %}{% assign y = post.date | date: '%Y' %}{% if y == '2010' %}
    <li>
      <span class="a-date">{{ post.date | date: "%m-%d" }}</span>
      <a href="{{ post.url }}">{{ post.title }}</a>
    </li>
  {% endif %}{% endfor %}
  </ul>
</section>
